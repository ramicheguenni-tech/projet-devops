groups:
  - name: devops-app-alerts
    rules:
      - alert: AppDown
        expr: up{job="devops-app"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "DevOps App is DOWN"
          description: "devops-app has been down for 30 seconds"

      - alert: HighMemoryUsage
        expr: sum(jvm_memory_used_bytes{area="heap"}) / sum(jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High JVM Heap Memory Usage"
          description: "JVM heap usage is above 85%"

      - alert: HighCPUUsage
        expr: process_cpu_usage > 0.8
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High CPU Usage"
          description: "CPU usage is above 80%"

      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP Error Rate"
          description: "More than 10% of requests are failing"
